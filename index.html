<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robohand</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(90deg,
          #243454 0%,
          #001130 35%,
          #000d28 70%,
          #0a1825 100%);
    }

    .card {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      background: #312b2b;
      text-align: center;
    }

    .button {
      background:
        radial-gradient(circle,
          rgba(15, 47, 153, 0.541) 18%,
          rgba(9, 39, 90, 0.95) 45%);
      width: 240px;
      height: 90px;
      border: none;
      border-radius: 20px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      border: 2px solid #b2d73d;
      transition: transform 0.15s, opacity 0.15s;
    }

    .button:active {
      transform: scale(0.96);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      margin-top: 18px;
      font-size: 28px;
      color: white;
      text-align: center;
    }

    dd {
      display: block;
      margin-inline-start: 0px;
      margin-top: 10px;
      unicode-bidi: isolate;
      justify-content: center;
    }

    .date {
      margin-top: 16px;
      font-size: 14px;
      color: #bdbdbd;
    }

    .error {
      margin-top: 16px;
      font-size: 14px;
      color: #ff3b30;
    }

    .off-text {
      color: #ff3b30;
      font-weight: bold;
    }

    .on-text {
      color: #34c759;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <div class="card">
    <button id="toggleBtn" class="button off">Сжать/Разжать</button>

    <div class="status">
      Текущий статус:
      <dd id="statusText" class="off-text">Загрузка...</dd>
    </div>

    <div id="dateText" class="date"></div>
    <div id="errorText" class="error"></div>
  </div>

  <script>
    const API_URL = 'https://suvorkin.org/api/public/robohand';

    const button = document.getElementById('toggleBtn');
    const statusText = document.getElementById('statusText');
    const dateText = document.getElementById('dateText');
    const errorText = document.getElementById('errorText');

    let enabled = false;

    function setLoading(isLoading) {
      button.disabled = isLoading;
      button.textContent = isLoading ? 'Ждем...' : 'Кнопка упавления';
    }

    function formatDate(dateString) {
      if (!dateString) {
        return 'нет данных';
      }

      return new Date(dateString).toLocaleString('ru-RU');
    }

    function updateStatus(data) {
      enabled = data.active;

      if (enabled) {
        statusText.textContent = 'ON';
        statusText.classList.remove('off-text');
        statusText.classList.add('on-text');
      } else {
        statusText.textContent = 'OFF';
        statusText.classList.remove('on-text');
        statusText.classList.add('off-text');
      }

      dateText.textContent = 'Изменен: ' + formatDate(data.changedAt);
    }

    async function loadStatus() {
      errorText.textContent = '';
      setLoading(true);

      try {
        const response = await fetch(API_URL);
        const data = await response.json();

        updateStatus(data);
      } catch (error) {
        errorText.textContent = 'Не удалось получить статус';
      }

      setLoading(false);
    }

    async function toggleStatus() {
      errorText.textContent = '';
      setLoading(true);

      try {
        const response = await fetch(API_URL + '/toggle', {
          method: 'POST'
        });
        const data = await response.json();

        updateStatus(data);
      } catch (error) {
        errorText.textContent = 'Не удалось изменить статус';
      }

      setLoading(false);
    }

    button.addEventListener('click', toggleStatus);

    loadStatus();
  </script>
</body>

</html>
