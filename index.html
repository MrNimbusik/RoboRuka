<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=10">
  <title>Robohand</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(90deg,
          #243454 0%,
          #001130 35%,
          #000d28 70%,
          #0a1825 100%);
    }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    main {
      width: min(420px, 100%);
      padding: 24px;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      background: #000000;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .button {
      background:
      radial-gradient(circle,
        rgba(255, 255, 255, 0.253) 0%,
        rgba(255, 255, 255, 0.116) 18%,
        rgba(1, 27, 71, 0.95) 45%);
      width: 240px;
      height: 90px;
      border: none;
      border-radius: 20px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      border: 2px solid #b2d73d;
    }


    .status {
      margin-top: 18px;
      font-size: 28px;
      color: white;
      text-align: center;

    }
    
    dd {
      display: block;
      margin-inline-start: 0px;
      margin-top: 10px;
      unicode-bidi: isolate;
      justify-content: center;
    }

    .off-text {
      color: #ff3b30;
      font-weight: bold;
    }

    .on-text {
      color: #34c759;
      font-weight: bold;
    }
  </style>

</head>

<body>

  <div class="card">
    <button id="toggleBtn" class="button off">Сжать/Разжать</button>

    <div class="status">
      Текущий статус:
      <dd id="statusText" class="off-text">OFF</dd>
    </div>

  </div>

  <script>
    const button = document.getElementById('toggleBtn');
    const statusText = document.getElementById('statusText');

    let enabled = false;

    button.addEventListener('click', () => {

      enabled = !enabled;

      document.body.classList.toggle('active');

      if (enabled) {

        statusText.textContent = 'ON';
        statusText.classList.remove('off-text');
        statusText.classList.add('on-text');

      } else {

        statusText.textContent = 'OFF';
        statusText.classList.remove('on-text');
        statusText.classList.add('off-text');

      }

    });

  </script>
</body>

</html>
